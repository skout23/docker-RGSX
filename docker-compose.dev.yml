services:
  rgsx-web-dev:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: rgsx-web-dev
    restart: unless-stopped
    environment:
      - TZ=UTC
      - RGSX_MODE=web
      - WEB_PORT=8080
      # Optional: Pre-seed 1fichier API key
      # - ONEFICHIER_API_KEY=your-api-key-here
    volumes:
      # Mount local directories for development
      - ./roms:/roms
      - ./saves:/saves
      # Optional: Mount upstream sources for hacking
      # - ./ports/RGSX:/opt/RGSX
    ports:
      - "8080:8080"  # Upstream Web UI (HTTPServer)
    networks:
      - rgsx-dev

networks:
  rgsx-dev:
    driver: bridge
